{% extends "base.html" %}
{% block title %}Jugadores{% endblock %}
{% block content %}

<h2>Participantes</h2>

<form method="post" class="row g-2 mb-4">
  <div class="col-auto">
    <input class="form-control" type="text" name="nombre" placeholder="Nombre del participante" required>
  </div>
  <div class="col-auto">
    <button class="btn btn-primary" type="submit">Agregar</button>
  </div>
</form>

<ul class="list-group">
  {% for j in jugadores %}
  <li class="list-group-item d-flex justify-content-between align-items-center flex-wrap gap-2">
    <a href="{{ url_for('detalle_jugador', jugador_id=j.id) }}">{{ j.nombre }}</a>
    <div class="d-flex gap-2 align-items-center flex-wrap">
      <form method="post" action="{{ url_for('fusionar_jugador', jugador_id=j.id) }}"
            onsubmit="return confirm('¿Fusionar a {{ j.nombre }} con el jugador seleccionado? Se moverán todas sus predicciones y se eliminará {{ j.nombre }}.');">
        <div class="input-group input-group-sm">
          <select name="jugador_destino_id" class="form-select form-select-sm" required>
            <option value="" disabled selected>Fusionar con…</option>
            {% for otro in jugadores %}
              {% if otro.id != j.id %}
                <option value="{{ otro.id }}">{{ otro.nombre }}</option>
              {% endif %}
            {% endfor %}
          </select>
          <button class="btn btn-warning btn-sm" type="submit">→</button>
        </div>
      </form>
      <form method="post" action="{{ url_for('eliminar_jugador', jugador_id=j.id) }}"
            onsubmit="return confirm('¿Eliminar a {{ j.nombre }} y todas sus predicciones?');">
        <button class="btn btn-sm btn-outline-danger" type="submit">Eliminar</button>
      </form>
    </div>
  </li>
  {% else %}
  <li class="list-group-item text-muted">Todavía no hay participantes.</li>
  {% endfor %}
</ul>

{% endblock %}
