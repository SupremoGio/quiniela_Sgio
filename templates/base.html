<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Quiniela Mundial 2026{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('index') }}">🏆 Quiniela Mundial 2026</a>
      <div class="navbar-nav">
        <a class="nav-link" href="{{ url_for('index') }}">Tabla</a>
        <a class="nav-link" href="{{ url_for('analisis') }}">Análisis</a>
        <a class="nav-link" href="{{ url_for('upload') }}">Subir predicciones</a>
        <a class="nav-link" href="{{ url_for('jugadores') }}">Jugadores</a>
      </div>
    </div>
  </nav>

  <div class="container">
    {% with mensajes = get_flashed_messages(with_categories=true) %}
      {% if mensajes %}
        {% for categoria, mensaje in mensajes %}
          <div class="alert alert-{{ 'danger' if categoria == 'error' else 'success' }}">{{ mensaje }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
