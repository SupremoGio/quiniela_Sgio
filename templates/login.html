{% extends "base.html" %}
{% block title %}Acceso admin — Quiniela Mundial 2026{% endblock %}
{% block content %}

<div style="max-width:360px;margin:0 auto;">
  <h1 class="q-h1" style="margin-bottom:6px;">Acceso administrador</h1>
  <p class="q-sub" style="margin-bottom:20px;">Inicia sesión para subir predicciones, gestionar jugadores y sincronizar resultados.</p>

  <div class="panel">
    <form method="post" class="d-flex flex-column gap-3">
      <div>
        <label style="font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--sub);margin-bottom:4px;display:block;">Usuario</label>
        <input class="form-control" type="text" name="username" required autofocus>
      </div>
      <div>
        <label style="font-family:var(--font-body);font-size:13px;font-weight:600;color:var(--sub);margin-bottom:4px;display:block;">Contraseña</label>
        <input class="form-control" type="password" name="password" required>
      </div>
      <div>
        <button class="btn-accent" type="submit">Entrar</button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
